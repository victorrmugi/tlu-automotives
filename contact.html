   <section class="bg-brand text-navy blue py-5">
  <div class="container">
    <h1 class="display-6 fw-bold mb-2">Contact Us</h1>
    <p class="mb-0 opacity-75">We're happy to help — reach out and we'll get back to you as soon as we can</p>
  </div>
</section>
<section class="py-5">
  <div class="container">
    <div class="row g-5">
        <div class="col-lg-7">
            <h2 class="h4 mb-4">Send us a message</h2>

        <form action="#" method="POST">
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                 <label class="form-label" for="firstName">First Name</label>
                 <input type="text" class="form-control" id="firstName"
                     placeholder="John" required>
                     </div> 
                  <div class="col-sm-6">
                       <label class="form-label" for="lastName">Last Name</label>
                      <input type="text" class="form-control" id="lastName"
                     placeholder="Kamau" required>
                   </div>
                   <div class="mb-3">
                      <label class="form-label" for="email">Email Address</label>
                      <input type="email" class="form-control" id="email"
                      placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
            <label class="form-label" for="phone">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-telephone"></i>
              </span>
              <input type="tel" class="form-control" id="phone"
                     placeholder="+254 700 000 000">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="subject">Subject</label>
            <select class="form-select" id="subject">
              <option value="" disabled selected>Select a subject...</option>
              <option>General Inquiry</option>
              <option>Book a Test Drive</option>
              <option>Financing Options</option>
              <option>Trade-In Valuation</option>
              <option>After-Sale Support</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label" for="message">Your Message</label>
            <textarea class="form-control" id="message" rows="5"
                      placeholder="Tell us which vehicle you're interested in, or how we can help..."
                      required></textarea>
          </div>
          <button type="submit" class="btn btn-brand btn-lg w-100">
            <i class="bi bi-send me-2"></i>Send Message
          </button>
                
              </div>  
            </div>

        </form>
        </div>
        <div class="col-lg-5">
        <h2 class="h4 mb-4">Find us</h2>
        </div>
        </section>

    </body>
